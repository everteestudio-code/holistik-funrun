<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dashboard Peserta</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script type="module" src="firebase.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body class="bg-slate-100 min-h-screen p-6">

  <div class="max-w-3xl mx-auto">

    <div class="bg-white rounded-3xl shadow-xl p-8 mb-6">

      <div class="flex justify-between items-center mb-8">

        <div>
          <h1 class="text-3xl font-black text-slate-800">
            Dashboard Peserta
          </h1>
        </div>

        <button
          onclick="logoutUser()"
          class="bg-red-500 hover:bg-red-600 text-white px-5 py-3 rounded-2xl font-bold"
        >
          Logout
        </button>

      </div>

      <form onsubmit="saveRegistration(event)" class="space-y-5">

        <input
          type="text"
          id="name"
          placeholder="Nama Lengkap"
          required
          class="w-full p-4 rounded-2xl border"
        >

        <input
          type="text"
          id="school"
          placeholder="Asal Sekolah"
          required
          class="w-full p-4 rounded-2xl border"
        >

        <select
          id="jersey"
          class="w-full p-4 rounded-2xl border"
        >
          <option value="S">Jersey S</option>
          <option value="M">Jersey M</option>
          <option value="L">Jersey L</option>
          <option value="XL">Jersey XL</option>
        </select>

        <div class="bg-orange-50 border border-orange-200 p-5 rounded-2xl">

          <h3 class="font-bold text-orange-700 mb-2">
            Pembayaran
          </h3>

          <p class="text-sm text-slate-600 mb-4">
            Transfer ke:
          </p>

          <div class="font-bold text-xl text-slate-800 mb-4">
            BANK JATENG<br>
            3020269366
          </div>

          <a
            href="https://wa.me/6282135832356"
            target="_blank"
            class="block w-full bg-green-500 hover:bg-green-600 text-white text-center py-4 rounded-2xl font-bold"
          >
            Kirim Bukti Transfer via WhatsApp
          </a>

        </div>

        <button
          class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold text-lg"
        >
          Simpan Pendaftaran
        </button>

      </form>

    </div>

    <div
      id="ticketCard"
      class="hidden bg-white rounded-3xl shadow-xl p-8"
    >

      <h2 class="text-2xl font-black mb-5">
        Tiket Peserta
      </h2>

      <div class="space-y-3">

        <div>
          <strong>Status:</strong>
          <span id="statusText"></span>
        </div>

        <div>
          <strong>Nomor BIB:</strong>
          <span id="bibText"></span>
        </div>

      </div>

      <div id="qrcode" class="mt-8"></div>

    </div>

  </div>

</body>
</html>
