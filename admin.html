<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Admin Panel</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script type="module" src="firebase.js"></script>

  <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body class="bg-slate-100 min-h-screen p-6">

  <div class="max-w-7xl mx-auto">

    <div class="bg-white rounded-3xl shadow-xl p-8 mb-8">

      <div class="flex justify-between items-center mb-8">

        <h1 class="text-3xl font-black">
          ADMIN PANEL
        </h1>

        <button
          onclick="logoutUser()"
          class="bg-red-500 hover:bg-red-600 text-white px-5 py-3 rounded-2xl font-bold"
        >
          Logout
        </button>

      </div>

      <div class="overflow-auto">

        <table class="w-full">

          <thead>

            <tr class="bg-slate-200">

              <th class="p-4 text-left">Nama</th>
              <th class="p-4 text-left">Sekolah</th>
              <th class="p-4 text-left">Jersey</th>
              <th class="p-4 text-left">Status</th>
              <th class="p-4 text-left">BIB</th>
              <th class="p-4 text-left">Action</th>

            </tr>

          </thead>

          <tbody id="participantTable"></tbody>

        </table>

      </div>

    </div>

    <div class="bg-white rounded-3xl shadow-xl p-8">

      <h2 class="text-2xl font-black mb-5">
        Scan QR Peserta
      </h2>

      <div id="reader"></div>

    </div>

  </div>

  <script>

    loadParticipants();

    function onScanSuccess(decodedText) {
      alert("QR Peserta: " + decodedText);
    }

    const html5QrcodeScanner = new Html5QrcodeScanner(
      "reader",
      {
        fps: 10,
        qrbox: 250
      }
    );

    html5QrcodeScanner.render(onScanSuccess);

  </script>

</body>
</html>
